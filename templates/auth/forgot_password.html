{% extends 'base.html' %}

{% block title %}Forgot Password - AI Interior Designer Pro{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-5">
                <div class="card border-0 shadow-lg" style="backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.9);">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="fas fa-lock fa-3x text-primary mb-3"></i>
                            <h2 class="fw-bold mb-2">Forgot Password</h2>
                            <p class="text-muted">Enter your email to reset your password</p>
                        </div>

                        <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                            <div class="mb-4">
                                <label for="email" class="form-label fw-500">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text border-0 bg-light">
                                        <i class="fas fa-envelope text-primary"></i>
                                    </span>
                                    <input type="email" class="form-control border-0 bg-light" id="email" 
                                           name="email" placeholder="Enter your email" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 fw-600 mb-3">
                                <i class="fas fa-paper-plane"></i> Send Reset Link
                            </button>
                        </form>

                        <div class="text-center">
                            <a href="{{ url_for('auth.login') }}" class="text-decoration-none">Back to login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
