{% extends 'base.html' %}

{% block title %}Register - AI Interior Designer Pro{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-6">
                <!-- Glassmorphism Card -->
                <div class="card border-0 shadow-lg" style="backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.9);">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold mb-2">Create Account</h2>
                            <p class="text-muted">Join our design community</p>
                        </div>

                        <form method="POST" action="{{ url_for('auth.register') }}" id="registerForm">
                            <!-- Username -->
                            <div class="mb-3">
                                <label for="username" class="form-label fw-500">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text border-0 bg-light">
                                        <i class="fas fa-user text-primary"></i>
                                    </span>
                                    <input type="text" class="form-control border-0 bg-light" id="username" 
                                           name="username" placeholder="Choose a username" required minlength="3">
                                </div>
                                <small class="text-muted" id="usernameStatus"></small>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label fw-500">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text border-0 bg-light">
                                        <i class="fas fa-envelope text-primary"></i>
                                    </span>
                                    <input type="email" class="form-control border-0 bg-light" id="email" 
                                           name="email" placeholder="Enter your email" required>
                                </div>
                            </div>

                            <!-- Password -->
                            <div class="mb-3">
                                <label for="password" class="form-label fw-500">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text border-0 bg-light">
                                        <i class="fas fa-lock text-primary"></i>
                                    </span>
                                    <input type="password" class="form-control border-0 bg-light" id="password" 
                                           name="password" placeholder="Create a password" required minlength="8">
                                </div>
                                <!-- Password Strength Meter -->
                                <div class="password-strength mt-2">
                                    <div class="strength-bar">
                                        <div class="strength-fill" id="strengthFill"></div>
                                    </div>
                                    <small id="strengthText" class="text-muted"></small>
                                </div>
                            </div>

                            <!-- Confirm Password -->
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label fw-500">Confirm Password</label>
                                <div class="input-group">
                                    <span class="input-group-text border-0 bg-light">
                                        <i class="fas fa-lock text-primary"></i>
                                    </span>
                                    <input type="password" class="form-control border-0 bg-light" id="confirmPassword" 
                                           name="confirm_password" placeholder="Confirm your password" required>
                                </div>
                            </div>

                            <!-- Terms & Conditions -->
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="terms" required>
                                <label class="form-check-label" for="terms">
                                    I agree to the <a href="#" class="text-decoration-none">Terms & Conditions</a>
                                </label>
                            </div>

                            <!-- Register Button -->
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-600 mb-3">
                                <i class="fas fa-user-plus"></i> Create Account
                            </button>
                        </form>

                        <!-- Sign In Link -->
                        <div class="text-center">
                            <p class="mb-0">Already have an account? 
                                <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-600">Sign in</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Password Strength Meter
    const passwordInput = document.getElementById('password');
    const strengthFill = document.getElementById('strengthFill');
    const strengthText = document.getElementById('strengthText');

    passwordInput.addEventListener('input', function() {
        const password = this.value;
        let strength = 0;

        if (password.length >= 8) strength++;
        if (/[a-z]/.test(password)) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;

        strengthFill.style.width = (strength * 20) + '%';

        if (strength === 0) {
            strengthText.textContent = '';
        } else if (strength === 1 || strength === 2) {
            strengthFill.style.backgroundColor = '#ff6b6b';
            strengthText.textContent = 'Weak';
        } else if (strength === 3 || strength === 4) {
            strengthFill.style.backgroundColor = '#ffd93d';
            strengthText.textContent = 'Medium';
        } else {
            strengthFill.style.backgroundColor = '#6bcf7f';
            strengthText.textContent = 'Strong';
        }
    });

    // Check username availability
    document.getElementById('username').addEventListener('blur', function() {
        const username = this.value;
        if (username.length >= 3) {
            fetch(`{{ url_for('auth.check_username') }}?username=${username}`)
                .then(r => r.json())
                .then(data => {
                    const status = document.getElementById('usernameStatus');
                    if (data.exists) {
                        status.textContent = 'Username already taken';
                        status.classList.add('text-danger');
                    } else {
                        status.textContent = 'Username available';
                        status.classList.remove('text-danger');
                        status.classList.add('text-success');
                    }
                });
        }
    });
</script>
{% endblock %}
