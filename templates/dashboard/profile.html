{% extends 'base.html' %}

{% block title %}My Profile - AI Interior Designer Pro{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-header bg-gradient text-white rounded-top-4 p-4">
                    <h4 class="mb-0"><i class="fas fa-user"></i> My Profile</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('dashboard.update_profile') }}">
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-600">First Name</label>
                                <input type="text" class="form-control" name="first_name" value="{{ current_user.first_name or '' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-600">Last Name</label>
                                <input type="text" class="form-control" name="last_name" value="{{ current_user.last_name or '' }}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-600">Email</label>
                            <input type="email" class="form-control" value="{{ current_user.email }}" disabled>
                            <small class="text-muted">Email cannot be changed</small>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-600">Phone</label>
                            <input type="tel" class="form-control" name="phone" value="{{ current_user.phone or '' }}">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-600">Bio</label>
                            <textarea class="form-control" name="bio" rows="3" placeholder="Tell us about yourself...">{{ current_user.bio or '' }}</textarea>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-600">City</label>
                                <input type="text" class="form-control" name="city" value="{{ current_user.city or '' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-600">State</label>
                                <input type="text" class="form-control" name="state" value="{{ current_user.state or '' }}">
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-600">Country</label>
                                <input type="text" class="form-control" name="country" value="{{ current_user.country or '' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-600">Zip Code</label>
                                <input type="text" class="form-control" name="zip_code" value="{{ current_user.zip_code or '' }}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-600">Address</label>
                            <input type="text" class="form-control" name="address" value="{{ current_user.address or '' }}">
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
